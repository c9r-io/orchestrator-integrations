# AgentLair API Key — copy this file and fill in your key.
# Get a key at: https://agentlair.dev (no signup, instant issuance)
# POST https://agentlair.dev/v1/auth/keys → returns al_live_... key
apiVersion: orchestrator.dev/v2
kind: SecretStore
metadata:
  name: agentlair-key
spec:
  data:
    api_key: "<your-agentlair-api-key>"
    # Optional: lock a dedicated email address for this agent team
    # agent_email: "<your-agent>@agentlair.dev"
