# Trigger: fires when a LINE message event is received.
# Webhook URL: http://<host>:<port>/webhook/line-message
apiVersion: orchestrator.dev/v2
kind: Trigger
metadata:
  name: line-message
spec:
  event:
    source: webhook
    webhook:
      secret:
        fromRef: line-channel
      signatureHeader: X-Line-Signature
  action:
    workflow: handle-line-message
    workspace: default
